<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Downloader</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>

<body>
  <main class="container">
    <h1>YT Downloader</h1>

    <section class="card">
      <form id="download-form">
        <label for="url">Video URL</label>
        <div class="url-row">
          <input id="url" name="url" type="url" placeholder="https://..." required />
          <button id="load-formats" type="button">Load qualities</button>
        </div>

        <label class="checkbox-row" for="audio-only">
          <input id="audio-only" name="audio_only" type="checkbox" />
          <span>Download audio only</span>
        </label>

        <label class="checkbox-row" for="playlist-mode">
          <input id="playlist-mode" name="playlist_mode" type="checkbox" />
          <span>Download playlist</span>
        </label>

        <small id="playlist-mode-hint" class="hint" hidden></small>

        <div id="quality-group" class="quality-group">
          <label for="quality">Quality (p)</label>
          <select id="quality" name="quality" required disabled>
            <option value="">Load qualities first</option>
          </select>
          <small id="formats-status" class="hint">Enter URL and load available qualities</small>
        </div>

        <div id="audio-quality-group" class="audio-quality-group" hidden>
          <label for="audio-bitrate">MP3 quality</label>
          <select id="audio-bitrate" name="audio_bitrate">
            <option value="320" selected>320 kbps</option>
            <option value="192">192 kbps</option>
          </select>
        </div>

        <button id="download-btn" type="submit" disabled>Download</button>
      </form>
    </section>

    <section class="card status-card" id="status-card" data-state="idle">
      <div class="status-header-row">
        <h2>Status</h2>
        <span id="status-phase" class="status-badge">Idle</span>
      </div>

      <div class="status-body">
        <span id="status-spinner" class="spinner" hidden></span>
        <p id="status-message">Waiting for start...</p>
      </div>
      <small id="status-meta" class="hint"></small>

      <details class="status-details">
        <summary>Technical details</summary>
        <pre id="status-raw">{
  "status": "idle"
}</pre>
      </details>
    </section>

    <section class="card">
      <div class="files-header">
        <h2>Downloaded Files</h2>
        <button id="refresh-files" type="button">Refresh</button>
      </div>
      <ul id="files"></ul>
    </section>
  </main>

  <script src="/web/playlist-mode.js"></script>
  <script src="/web/app.js"></script>
</body>

</html>
